<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>LN Filter</title>
  <style>
    :root {
      --bg-deep:   oklch(0.13 0.02 280);
      --surface-1: oklch(0.95 0.005 280 / 0.04);
      --surface-2: oklch(0.95 0.005 280 / 0.08);
      --border-1:  oklch(0.95 0.005 280 / 0.08);
      --border-2:  oklch(0.95 0.005 280 / 0.14);
      --text:      oklch(0.95 0.005 280);
      --text-2:    oklch(0.75 0.02 280);
      --text-3:    oklch(0.55 0.02 280);
      --accent:    oklch(0.7 0.18 300);
      --accent-soft: oklch(0.7 0.18 300 / 0.18);
      --red:   oklch(0.65 0.2 25);
      --amber: oklch(0.8 0.15 80);
      --green: oklch(0.75 0.18 145);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 320px;
      background: var(--bg-deep);
      color: var(--text);
      font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    }
    .blob {
      position: fixed; pointer-events: none; z-index: 0;
      border-radius: 50%; filter: blur(60px);
    }
    .blob.violet {
      width: 300px; height: 300px;
      background: radial-gradient(circle, oklch(0.4 0.18 300 / 0.5), transparent 70%);
      top: -120px; left: -80px;
    }
    .blob.blue {
      width: 280px; height: 280px;
      background: radial-gradient(circle, oklch(0.4 0.16 240 / 0.4), transparent 70%);
      bottom: -100px; right: -100px;
    }

    .wrap { position: relative; z-index: 1; padding: 14px; display: flex; flex-direction: column; gap: 12px; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-1);
    }
    .brand {
      font: 600 13px/1 "JetBrains Mono", ui-monospace, monospace;
      letter-spacing: 0.5px;
    }
    .brand .accent { color: var(--accent); }
    .ver { color: var(--text-3); font: 10px/1 "JetBrains Mono", ui-monospace, monospace; }

    .card {
      background: var(--surface-1);
      border: 1px solid var(--border-1);
      border-radius: 10px;
      padding: 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .label {
      font: 500 10px/1 "JetBrains Mono", ui-monospace, monospace;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-3);
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .val { color: var(--accent); font-weight: 600; }

    .seg {
      display: flex; gap: 2px; padding: 2px;
      background: var(--surface-2);
      border: 1px solid var(--border-1);
      border-radius: 8px;
    }
    .seg button {
      flex: 1; background: transparent; border: 0;
      color: var(--text-2); padding: 7px;
      font: 500 11px/1 inherit;
      border-radius: 6px; cursor: pointer;
      transition: background 120ms ease, color 120ms ease;
    }
    .seg button:hover { background: var(--surface-2); color: var(--text); }
    .seg button.on {
      background: var(--accent-soft);
      color: var(--text);
    }

    input[type="range"] {
      width: 100%; accent-color: var(--accent);
    }

    .check {
      display: flex; align-items: center; gap: 8px;
      font: 12px/1.3 inherit; color: var(--text-2);
    }
    .check input { accent-color: var(--accent); }

    .status {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
      font: 11px/1 "JetBrains Mono", ui-monospace, monospace;
    }
    .stat {
      padding: 8px; border-radius: 8px;
      background: var(--surface-2); border: 1px solid var(--border-1);
      display: flex; flex-direction: column; gap: 4px;
    }
    .stat .n {
      font-size: 16px; font-weight: 600;
    }
    .stat .lab { color: var(--text-3); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; }

    .alert {
      padding: 9px 11px;
      border-radius: 8px;
      border: 1px solid;
      font-size: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .alert.warn {
      background: oklch(0.5 0.15 80 / 0.18);
      border-color: oklch(0.7 0.15 80 / 0.4);
      color: oklch(0.95 0.1 80);
    }
    .alert.ok {
      background: oklch(0.5 0.15 145 / 0.14);
      border-color: oklch(0.7 0.18 145 / 0.4);
      color: oklch(0.9 0.1 145);
    }

    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    button.btn {
      padding: 9px;
      border-radius: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border-1);
      color: var(--text);
      cursor: pointer;
      font: 500 12px/1 inherit;
      transition: background 120ms ease;
    }
    button.btn:hover { background: oklch(0.95 0.005 280 / 0.12); }
    button.btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 4px 12px oklch(0.7 0.18 300 / 0.3);
    }
    button.btn.primary:hover { background: oklch(0.78 0.18 300); }

    .foot {
      text-align: center; font-size: 10px;
      color: var(--text-3);
      font-family: "JetBrains Mono", ui-monospace, monospace;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="blob violet"></div>
  <div class="blob blue"></div>

  <div class="wrap">
    <header>
      <span class="brand"><span class="accent">◬</span> LN&nbsp;FILTER</span>
      <span class="ver" id="ver">v0.1.0</span>
    </header>

    <div id="key-alert"></div>

    <div class="card">
      <div>
        <div class="label">MODUS</div>
        <div class="seg" id="seg-mode">
          <button data-mode="off">Aus</button>
          <button data-mode="dim">Dim</button>
          <button data-mode="hide">Hide</button>
        </div>
      </div>
      <div>
        <div class="label">SCHWELLE <span class="val" id="thr-val">45</span></div>
        <input type="range" id="thr" min="0" max="100" value="45" />
      </div>
      <label class="check"><input type="checkbox" id="sort" checked /> Feed nach Score sortieren</label>
      <label class="check"><input type="checkbox" id="overlay" checked /> Overlay auf LinkedIn anzeigen</label>
    </div>

    <div class="card">
      <div class="label">AKTUELLER TAB</div>
      <div class="status">
        <div class="stat">
          <span class="n" id="stat-rated">—</span>
          <span class="lab">bewertet</span>
        </div>
        <div class="stat">
          <span class="n" id="stat-pending">—</span>
          <span class="lab">offen</span>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn" id="btn-rerate">Neu bewerten</button>
      <button class="btn primary" id="btn-options">Optionen</button>
    </div>

    <div class="foot">Gemini-Powered · made with Claude</div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
